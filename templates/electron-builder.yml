# electron-builder — packages the electron-vite build (out/) into platform
# installers: .dmg (macOS), NSIS .exe (Windows), .AppImage + .deb (Linux).
# Run after `npm run build`. Unsigned by default — see the handbook's
# electron-tooling.md. Set appId / productName / publish owner+repo for your app.
appId: ai.parkviewlab.<repo>
productName: <Product Name>
artifactName: ${name}-${version}-${arch}.${ext}
directories:
  output: dist
  buildResources: build
files:
  - '!src/**'
  - '!docs/**'
  - '!scripts/**'
  - '!.github/**'
  - '!LICENSES/**'
  - '!{electron.vite.config.js,eslint.config.mjs,electron-builder.yml,cliff.toml,REUSE.toml,LICENSING.md,CHANGELOG.md,README.md,AGENTS.md,CLAUDE.md,.gitignore}'
mac:
  category: public.app-category.productivity
  target: dmg
  # Unsigned for now; the release workflow sets CSC_IDENTITY_AUTO_DISCOVERY=false.
  notarize: false
win:
  target: nsis
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: ${productName}
linux:
  target:
    - AppImage
    - deb
  category: Utility
  maintainer: Gary Frattarola <garyf@parkviewlab.ai>
npmRebuild: false
# Ship the generated license/notice bundle (run `npm run legal` first; CI does
# this before packaging). electron-builder deletes LICENSES.chromium.html from the
# macOS .app, so legal/ carries its own copy → one path on all OSes. See
# electron-tooling.md → "License notices + in-app viewer".
extraResources:
  - from: legal
    to: legal
    filter: ['**/*']
publish:
  provider: github
  owner: ParkviewLab
  repo: <repo>
