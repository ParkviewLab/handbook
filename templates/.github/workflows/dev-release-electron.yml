name: Dev release

# On-demand PRE-RELEASE build from `develop` — exercises the cross-platform build
# before a real release. Manually triggered (workflow_dispatch; run with
# `--ref develop`). Builds installers on a macOS / Windows / Linux matrix and
# uploads them as workflow ARTIFACTS (7-day retention). It creates NO `v*` tag and
# no GitHub Release, so release-electron.yml's gate is untouched. Unlike the
# Python TestPyPI dev-release it publishes to no registry, so it does NOT require
# a distinct X.Y.Z-dev.N version — whatever develop carries is fine. See the
# handbook's electron-tooling.md / releases.md ("Development versioning").

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify dev build runs from develop
        run: |
          if [ "$GITHUB_REF" != "refs/heads/develop" ]; then
            echo "dev-release runs from develop only (got $GITHUB_REF)"; exit 1
          fi

  build:
    needs: gate
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Package installers (unsigned)
        run: npx electron-builder --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: dev-installers-${{ matrix.os }}
          retention-days: 7
          if-no-files-found: error
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
