name: REUSE

# REUSE/SPDX compliance for website repos — identical to reuse.yml but on the
# website branch names (live, staging). It's the only required check on a website
# repo. See the handbook's licensing.md, ci.md, and website.md.

on:
  pull_request:
    branches: [live, staging]
  push:
    branches: [live, staging]

permissions:
  contents: read

jobs:
  reuse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
      - name: reuse lint
        run: uvx --from "reuse[charset-normalizer]" reuse lint
