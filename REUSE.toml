version = 1

SPDX-PackageName = "handbook"
SPDX-PackageSupplier = "Gary Frattarola <garyf@parkviewlab.ai>"

# Documentation + repo meta → CC-BY-4.0
[[annotations]]
path = ["docs/**", "templates/md-to-html/README.md", "templates/CONTRIBUTING.md", "templates/LICENSING.md.template", "README.md", "LICENSING.md", "REUSE.toml", ".gitignore", "AGENTS.md", "CLAUDE.md", "VERSION.txt"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Gary Frattarola <garyf@parkviewlab.ai>"
SPDX-License-Identifier = "CC-BY-4.0"

# Scripts + templates (code/config/boilerplate) → AGPL-3.0-or-later
[[annotations]]
path = [".github/**", "scripts/**", "templates/cliff.toml", "templates/generate_changelog.py", "templates/pyproject.toml.template", "templates/REUSE.toml.template", "templates/AGENTS.md.template", "templates/CLAUDE.md.template", "templates/md-to-html/default.html", "templates/.github/**"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Gary Frattarola <garyf@parkviewlab.ai>"
SPDX-License-Identifier = "AGPL-3.0-or-later"

# Brand logos/marks → all rights reserved (Gary's marks)
[[annotations]]
path = ["brand/logos/**"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Gary Frattarola <garyf@parkviewlab.ai>"
SPDX-License-Identifier = "LicenseRef-AllRightsReserved"

# Bundled Michroma typeface → third-party, SIL Open Font License 1.1
[[annotations]]
path = ["brand/fonts/**"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 The Michroma Project Authors"
SPDX-License-Identifier = "OFL-1.1"
